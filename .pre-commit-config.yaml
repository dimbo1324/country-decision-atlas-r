repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|README.*|.*\.md$|.*\.txt$)
      - id: end-of-file-fixer
        exclude: ^(docs/|README.*|.*\.md$|.*\.txt$)
      - id: check-yaml
        exclude: ^(docs/|contracts/openapi\.yaml$)
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^(docs/|README.*|.*\.md$|.*\.txt$)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: ^apps/(api|worker)/.*\.py$
      - id: ruff-format
        files: ^apps/(api|worker)/.*\.py$

  - repo: local
    hooks:
      - id: prettier-format-check
        name: prettier
        entry: corepack pnpm@9.12.0 format:check
        language: system
        pass_filenames: false

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.4.0
    hooks:
      - id: sqlfluff-fix
        args: ["--dialect", "postgres"]
        files: ^database/.*\.sql$
