name: country-decision-atlas

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-country_atlas}
      POSTGRES_USER: ${POSTGRES_USER:-country_atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      python -m uvicorn app.main:app --app-dir apps/api --host 0.0.0.0 --port 8000
    environment:
      APP_NAME: ${APP_NAME:-Country Decision Atlas}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-600}
      API_RATE_LIMIT_AUTH_PER_MINUTE: ${API_RATE_LIMIT_AUTH_PER_MINUTE:-300}
      TRUSTED_PROXY_HEADERS: ${TRUSTED_PROXY_HEADERS:-false}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-country_atlas}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-country_atlas}
      CACHE_MODE: ${CACHE_MODE:-null}
      REDIS_URL: redis://redis:6379/0
      CACHE_NAMESPACE: ${CACHE_NAMESPACE:-cda}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-300}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-168}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-12}
      AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-true}
      AUTH_LOGIN_MAX_FAILED_ATTEMPTS: ${AUTH_LOGIN_MAX_FAILED_ATTEMPTS:-5}
      AUTH_LOGIN_FAILURE_WINDOW_SECONDS: ${AUTH_LOGIN_FAILURE_WINDOW_SECONDS:-900}
      AUTH_LOGIN_LOCKOUT_SECONDS: ${AUTH_LOGIN_LOCKOUT_SECONDS:-60}
      AUTH_LOGIN_LOCKOUT_MAX_SECONDS: ${AUTH_LOGIN_LOCKOUT_MAX_SECONDS:-900}
      AUTH_SESSION_ROTATION_INTERVAL_MINUTES: ${AUTH_SESSION_ROTATION_INTERVAL_MINUTES:-15}
      AUTH_SESSION_ROTATION_GRACE_SECONDS: ${AUTH_SESSION_ROTATION_GRACE_SECONDS:-30}
      SECURITY_HSTS_ENABLED: ${SECURITY_HSTS_ENABLED:-false}
      NOTIFIER_INTERNAL_AUTH_TOKEN: ${NOTIFIER_INTERNAL_AUTH_TOKEN:-dev-grpc-token}
      NOTIFIER_GRPC_ADDR: ${NOTIFIER_GRPC_ADDR:-notifier:9090}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request;
          urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redpanda:
    image: redpandadata/redpanda:v24.1.13
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=512M
      - --mode=dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "19644:9644"
    profiles:
      - alerts
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    profiles:
      - alerts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifier:
    build:
      context: .
      dockerfile: apps/notifier/Dockerfile
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-cda.domain-events}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-signal-notifier}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      MONGO_DATABASE: ${MONGO_DATABASE:-country_decision_alerts}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-fake}
      NOTIFY_AFTER: ${NOTIFY_AFTER:-2026-01-01T00:00:00Z}
      NOTIFIER_HTTP_ADDR: ${NOTIFIER_HTTP_ADDR:-:8081}
      GRPC_ADDR: ${GRPC_ADDR:-:9090}
      GRPC_AUTH_TOKEN: ${GRPC_AUTH_TOKEN:-dev-grpc-token}
    ports:
      - "8081:8081"
      - "9090:9090"
    depends_on:
      redpanda:
        condition: service_healthy
      mongo:
        condition: service_healthy
    profiles:
      - alerts

volumes:
  postgres-data:
  redis-data:
  mongo-data:
