# Production overlay (P2-10, Аудит-эпизод 6). Not a replacement for
# docker-compose.yml — apply both:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds what the base (dev) file intentionally skips for local convenience:
# restart policies, password-protected Redis/Mongo with their ports kept off
# the host network, and baseline memory/CPU limits. REDIS_PASSWORD,
# MONGO_ROOT_USERNAME, and MONGO_ROOT_PASSWORD have no default here and must
# be set in the environment — the ${VAR:?message} form fails `docker compose
# config`/`up` immediately if they are missing, the same fail-fast spirit as
# the Settings validator in core/config.py (P1-10) for the app-level secrets
# that validator already covers.

services:
  postgres:
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}

  redis:
    restart: unless-stopped
    command: >-
      redis-server --requirepass
      ${REDIS_PASSWORD:?REDIS_PASSWORD must be set for docker-compose.prod.yml}
    ports: !reset []
    mem_limit: ${REDIS_MEM_LIMIT:-256m}

  api:
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set for docker-compose.prod.yml}@redis:6379/0
    mem_limit: ${API_MEM_LIMIT:-1g}
    cpus: ${API_CPUS:-2.0}

  redpanda:
    restart: unless-stopped
    mem_limit: ${REDPANDA_MEM_LIMIT:-768m}
    cpus: ${REDPANDA_CPUS:-1.0}

  mongo:
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME must be set for docker-compose.prod.yml}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set for docker-compose.prod.yml}
    ports: !reset []
    mem_limit: ${MONGO_MEM_LIMIT:-512m}

  notifier:
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME must be set for docker-compose.prod.yml}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set for docker-compose.prod.yml}@mongo:27017/?authSource=admin
    mem_limit: ${NOTIFIER_MEM_LIMIT:-256m}
