    get:
      tags:
      - countries
      - cii
      summary: Compare Countries Cii
      operationId: compare_countries_cii_api_v1_countries_compare_get
      parameters:
      - name: countries
        in: query
        required: true
        schema:
          type: string
          description: Comma-separated country slugs, exactly 2 for MVP
          title: Countries
        description: Comma-separated country slugs, exactly 2 for MVP
      - name: scenario
        in: query
        required: true
        schema:
          type: string
          description: Scenario slug
          title: Scenario
        description: Scenario slug
      - name: persona
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Persona
      - name: locale
        in: query
        required: false
        schema:
          type: string
          pattern: ^[a-z]{2}$
          enum:
          - en
          - ru
          default: ru
          title: Locale
      responses:
        '200':
          description: Successful Response
