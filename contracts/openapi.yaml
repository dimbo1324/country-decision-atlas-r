openapi: 3.1.0
info:
  title: Country Decision Atlas API
  version: 0.1.0
  description: Backend contract for the first country, relocation, and legal signal API foundation.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      tags: [system]
      summary: Healthcheck
      responses:
        "200":
          description: Service health state.
          content:
            application/json:
              schema:
                type: object
                required: [status, service, environment]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: api
                  environment:
                    type: string
                    example: local
  /api/v1/countries:
    get:
      tags: [countries]
      summary: List countries
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated countries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/countries/{country_id}:
    get:
      tags: [countries]
      summary: Get a country by UUID or slug
      parameters:
        - $ref: "#/components/parameters/CountryId"
        - $ref: "#/components/parameters/Locale"
      responses:
        "200":
          description: Country detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/countries/{country_id}/profile:
    get:
      tags: [countries]
      summary: Get a country profile
      parameters:
        - $ref: "#/components/parameters/CountryId"
        - $ref: "#/components/parameters/Locale"
      responses:
        "200":
          description: Country profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryProfileResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/countries/{country_id}/legal-signals:
    get:
      tags: [legal_signals]
      summary: List legal and political signals for a country
      parameters:
        - $ref: "#/components/parameters/CountryId"
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated legal signals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalSignalListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/countries/{country_id}/scores:
    get:
      tags: [countries]
      summary: List country scores by scenario
      parameters:
        - $ref: "#/components/parameters/CountryId"
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated scores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryScoreListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/scenarios:
    get:
      tags: [scenarios]
      summary: List scenarios
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated scenarios.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/scenario-runs:
    post:
      tags: [scenarios]
      summary: Run a simple scenario score lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioRunInput"
      responses:
        "200":
          description: Scenario run result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioRunResult"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/sources:
    get:
      tags: [sources]
      summary: List sources
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/evidence-items:
    get:
      tags: [sources]
      summary: List evidence items
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated evidence items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItemListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/translations:
    get:
      tags: [translations]
      summary: List translations
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated translations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/admin/legal-signals:
    post:
      tags: [admin]
      summary: Create a legal signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegalSignalCreate"
      responses:
        "201":
          description: Created legal signal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalSignalResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/admin/translations/jobs:
    post:
      tags: [admin]
      summary: Queue a translation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationJobCreate"
      responses:
        "201":
          description: Created translation job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationJobResponse"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    CountryId:
      name: country_id
      in: path
      required: true
      schema:
        type: string
      description: Country UUID or slug.
    Locale:
      name: locale
      in: query
      required: false
      schema:
        type: string
        enum: [en, ru]
        default: en
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LocaleResolution:
      type: object
      required: [requested_locale, resolved_locale, translation_status]
      properties:
        requested_locale:
          type: string
          example: ru
        resolved_locale:
          type: string
          example: en
        translation_status:
          type: string
          enum: [source, translated, missing]
          example: missing
    Pagination:
      type: object
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
    Country:
      type: object
      required: [id, slug, iso2, iso3, name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        iso2:
          type: string
        iso3:
          type: string
        name:
          type: string
        official_name:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        subregion:
          type: string
          nullable: true
        capital:
          type: string
          nullable: true
        currency_code:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CountryProfile:
      type: object
      required: [id, country_id, summary, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        country_id:
          type: string
          format: uuid
        summary:
          type: string
        residence_overview:
          type: string
          nullable: true
        citizenship_overview:
          type: string
          nullable: true
        tax_overview:
          type: string
          nullable: true
        business_overview:
          type: string
          nullable: true
        quality_of_life_overview:
          type: string
          nullable: true
        risk_overview:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Source:
      type: object
      required:
        [id, title, url, source_type, reliability_level, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        url:
          type: string
          format: uri
        source_type:
          type: string
        publisher:
          type: string
          nullable: true
        country_id:
          type: string
          format: uuid
          nullable: true
        locale_id:
          type: string
          format: uuid
          nullable: true
        reliability_level:
          type: string
          enum: [low, medium, high]
        published_at:
          type: string
          format: date
          nullable: true
        accessed_at:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EvidenceItem:
      type: object
      required:
        [
          id,
          source_id,
          title,
          summary,
          evidence_type,
          confidence_level,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        country_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        summary:
          type: string
        url:
          type: string
          format: uri
          nullable: true
        quote:
          type: string
          nullable: true
        evidence_type:
          type: string
        confidence_level:
          type: string
          enum: [low, medium, high]
        published_at:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LegalSignal:
      type: object
      required:
        - id
        - country_id
        - title
        - summary
        - signal_type
        - sentiment
        - severity
        - status
        - confidence_level
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        country_id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        signal_type:
          type: string
          enum:
            [
              law,
              bill,
              policy,
              court_decision,
              administrative_change,
              political_signal,
              other,
            ]
        sentiment:
          type: string
          enum: [positive, neutral, negative, mixed, unknown]
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [draft, proposed, adopted, rejected, active, expired, unknown]
        confidence_level:
          type: string
          enum: [low, medium, high]
        effective_date:
          type: string
          format: date
          nullable: true
        published_at:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LegalSignalCreate:
      type: object
      required: [country_id, title, summary, signal_type]
      properties:
        country_id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        signal_type:
          type: string
          enum:
            [
              law,
              bill,
              policy,
              court_decision,
              administrative_change,
              political_signal,
              other,
            ]
        sentiment:
          type: string
          enum: [positive, neutral, negative, mixed, unknown]
          default: unknown
        severity:
          type: string
          enum: [low, medium, high, critical]
          default: low
        status:
          type: string
          enum: [draft, proposed, adopted, rejected, active, expired, unknown]
          default: draft
        confidence_level:
          type: string
          enum: [low, medium, high]
          default: low
        effective_date:
          type: string
          format: date
          nullable: true
        published_at:
          type: string
          format: date
          nullable: true
    Scenario:
      type: object
      required: [id, slug, name, is_active, created_at, updated_at, criteria]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioCriterion"
    ScenarioCriterion:
      type: object
      required:
        [
          id,
          scenario_id,
          key,
          label,
          weight,
          is_required,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        key:
          type: string
        label:
          type: string
        weight:
          type: number
        is_required:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CountryScore:
      type: object
      required:
        - id
        - country_id
        - scenario_id
        - scenario_slug
        - scenario_name
        - score
        - score_label
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        country_id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        scenario_slug:
          type: string
        scenario_name:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
        score_label:
          type: string
        summary:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Translation:
      type: object
      required:
        [
          id,
          entity_type,
          entity_id,
          field_name,
          locale_id,
          translated_value,
          status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        field_name:
          type: string
        locale_id:
          type: string
          format: uuid
        translated_value:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TranslationJob:
      type: object
      required:
        [
          id,
          entity_type,
          entity_id,
          target_locale_id,
          status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        source_locale_id:
          type: string
          format: uuid
          nullable: true
        target_locale_id:
          type: string
          format: uuid
        status:
          type: string
        provider:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TranslationJobCreate:
      type: object
      required: [entity_type, entity_id, target_locale_code]
      properties:
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        source_locale_code:
          type: string
          default: en
        target_locale_code:
          type: string
          enum: [en, ru]
        provider:
          type: string
          nullable: true
    ScenarioRunInput:
      type: object
      required: [scenario_slug, country_ids]
      properties:
        scenario_slug:
          type: string
        country_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
    ScenarioRunResult:
      type: object
      required: [scenario_slug, results]
      properties:
        scenario_slug:
          type: string
        results:
          type: array
          items:
            type: object
            required: [country_id, country_slug, score, score_label]
            properties:
              country_id:
                type: string
                format: uuid
              country_slug:
                type: string
              score:
                type: number
              score_label:
                type: string
              summary:
                type: string
                nullable: true
    CountryListResponse:
      type: object
      required: [items, pagination, locale]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Country"
        pagination:
          $ref: "#/components/schemas/Pagination"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    CountryResponse:
      type: object
      required: [item, locale]
      properties:
        item:
          $ref: "#/components/schemas/Country"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    CountryProfileResponse:
      type: object
      required: [item, locale]
      properties:
        item:
          $ref: "#/components/schemas/CountryProfile"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    LegalSignalListResponse:
      type: object
      required: [items, pagination, locale]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LegalSignal"
        pagination:
          $ref: "#/components/schemas/Pagination"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    LegalSignalResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/LegalSignal"
    ScenarioListResponse:
      type: object
      required: [items, pagination, locale]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        pagination:
          $ref: "#/components/schemas/Pagination"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    CountryScoreListResponse:
      type: object
      required: [items, pagination, locale]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CountryScore"
        pagination:
          $ref: "#/components/schemas/Pagination"
        locale:
          $ref: "#/components/schemas/LocaleResolution"
    SourceListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        pagination:
          $ref: "#/components/schemas/Pagination"
    EvidenceItemListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
    TranslationListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Translation"
        pagination:
          $ref: "#/components/schemas/Pagination"
    TranslationJobResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/TranslationJob"
