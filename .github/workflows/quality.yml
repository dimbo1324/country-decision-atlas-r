name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check apps packages scripts tests

      - name: Ruff format check
        run: python -m ruff format --check apps packages scripts tests

      - name: MyPy
        run: python -m mypy apps packages scripts tests

      - name: Pytest
        run: python -m pytest

      - name: SQLFluff
        run: python -m sqlfluff lint database --dialect postgres

  notifier:
    name: Go notifier quality
    runs-on: ubuntu-latest

    env:
      TELEGRAM_MODE: fake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/notifier/go.mod
          cache: true
          cache-dependency-path: apps/notifier/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf files
        working-directory: apps/notifier
        run: |
          protoc --go_out="module=github.com/country-decision-atlas/notifier:." \
                 --go-grpc_out="module=github.com/country-decision-atlas/notifier:." \
                 proto/subscriptions.proto

      - name: Go mod download
        working-directory: apps/notifier
        run: go mod download

      - name: gofmt check
        working-directory: apps/notifier
        run: test -z "$(gofmt -l .)"

      - name: go vet
        working-directory: apps/notifier
        run: go vet ./...

      - name: go test
        working-directory: apps/notifier
        run: go test ./...

  integration:
    name: Integration / migration smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: country_atlas
          POSTGRES_USER: country_atlas
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U country_atlas -d country_atlas" --health-interval
          10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Apply migrations on clean DB
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
        run: python scripts/apply_migrations.py

      - name: Apply migrations again (idempotency check)
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
        run: python scripts/apply_migrations.py

      - name: Start API
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
          REDIS_URL: redis://localhost:6379/0
          ADMIN_TOKEN: ci-test-admin-token
          APP_ENV: local
        run: |
          python -m uvicorn app.main:app --app-dir apps/api --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Runtime smoke tests
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
          API_BASE_URL: http://localhost:8000
          ADMIN_TOKEN: ci-test-admin-token
          RUN_RUNTIME_SMOKE_TESTS: "1"
        run: python -m pytest tests/smoke/ -v

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts
        run: pnpm contracts:generate

      - name: Check generated contracts are committed
        run: git diff --exit-code packages/contracts/generated/types.ts

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: country_atlas
          POSTGRES_USER: country_atlas
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U country_atlas -d country_atlas" --health-interval
          10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
        run: python scripts/apply_migrations.py

      - name: Check migration idempotency
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
        run: python scripts/apply_migrations.py

      - name: Start API
        env:
          DATABASE_URL: postgresql://country_atlas:change-me@localhost:5432/country_atlas
          REDIS_URL: redis://localhost:6379/0
          ADMIN_TOKEN: ci-test-admin-token
          APP_ENV: local
          API_RATE_LIMIT_PER_MINUTE: 5000
        run: |
          python -m uvicorn app.main:app --app-dir apps/api --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8000/ready && exit 0
            sleep 1
          done
          cat api.log
          exit 1

      - name: Run frontend regression gate
        env:
          API_BASE_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          ADMIN_TOKEN: ci-test-admin-token
          APP_ENV: local
        run: pnpm web:mvp:check

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            local-artifacts/playwright-report
            local-artifacts/test-results
            api.log
          if-no-files-found: ignore
