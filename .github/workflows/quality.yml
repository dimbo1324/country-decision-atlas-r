name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check apps packages scripts tests

      - name: Ruff format check
        run: python -m ruff format --check apps packages scripts tests

      - name: MyPy
        run: python -m mypy apps packages scripts tests

      - name: Pytest
        run: python -m pytest

      - name: SQLFluff
        run: python -m sqlfluff lint database --dialect postgres

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
