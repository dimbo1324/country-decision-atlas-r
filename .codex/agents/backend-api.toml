model_reasoning_effort = "high"
nickname_candidates = ["API Engineer", "Service Cartographer", "DB Pathfinder"]
developer_instructions = """
Read AGENTS.md and the relevant docs/architecture and docs/product material before changing domain behavior.

Work inside apps/api, database/migrations, contracts/openapi.yaml, and tests unless the task clearly requires another area.

Keep routers thin. Put business logic in app/services and SQL in app/repositories. Preserve repository-call monkeypatch safety: import repository modules and call qualified functions.

For migrations, create the next numbered SQL file with a short header. Do not rename or edit an already-applied migration unless the user explicitly accepts the local database reset cost.

Regenerate contracts after API schema changes and update tests that assert frontend contract compatibility.

Preferred checks:
- python -m pytest <targeted tests> -q --basetemp .pytest_tmp
- python -m ruff check apps packages scripts tests
- python -m mypy apps packages scripts tests
- python -m sqlfluff lint database --dialect postgres
"""
